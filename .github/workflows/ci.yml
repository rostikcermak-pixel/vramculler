name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  test:
    name: test ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile (syntax check)
        run: python -m py_compile vramculler.py

      - name: Run tests (stdlib only)
        run: python -m unittest discover -s tests -v

      - name: Smoke-test the CLI
        run: |
          python vramculler.py --version
          python vramculler.py --help

  test-with-rich:
    name: test with rich (optional dep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install optional rich
        run: python -m pip install --upgrade pip rich
      - name: Run tests with rich present
        run: python -m unittest discover -s tests -v
